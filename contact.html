<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Madushan's Fashion House</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- navbar -->
    <nav class="navbar">
        <div class="logo">
            <h1>Madushan's <span>Fashion House</span></h1>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#categories">Categories</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html" class="active">Contact Us</a></li>
        </ul>
        <div class="nav-icons">
            <a href="#"><i class="fas fa-search"></i></a>
            <a href="#"><i class="fas fa-shopping-cart"></i></a>
            <a href="login.html"><i class="fas fa-user"></i> Login</a>
        </div>
    </nav>

    <!-- header -->
    <header class="hero" style="height: 40vh; background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
        <div class="hero-content">
            <h2 style="color: white;">Contact Us</h2>
        </div>
    </header>

    <!-- content area -->
    <section class="categories-section fade-in" style="max-width: 600px; margin: auto;">
        <div class="section-title">
            <h2>Get In Touch</h2>
            <p>Send us a message and we will get back to you.</p>
        </div>
        
        <form style="display: flex; flex-direction: column; gap: 20px;">
            <input type="text" placeholder="Your Name" style="padding: 15px; border: 2px solid #eee; border-radius: 10px; font-family: 'Outfit'; font-size: 16px;">
            <input type="email" placeholder="Your Email" style="padding: 15px; border: 2px solid #eee; border-radius: 10px; font-family: 'Outfit'; font-size: 16px;">
            <textarea placeholder="Message" rows="5" style="padding: 15px; border: 2px solid #eee; border-radius: 10px; font-family: 'Outfit'; font-size: 16px; resize: none;"></textarea>
            <button type="button" class="btn" onclick="alert('Message Sent!')" style="border: none; cursor: pointer;">Send Message</button>
        </form>
    </section>

    <!-- footer area -->
    <footer>
        <div class="footer-content">
            <h3>Madushan's Fashion House</h3>
            <p>Premium quality clothing for everyone.</p>
            <div class="socials">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Madushan's Fashion House. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/script.js"></script>
</body>
</html>
