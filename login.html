<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madushan's Fashion House - Login</title>
    <link rel="stylesheet" href="assets/css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container" id="container">
        <!-- sign up part -->
        <div class="form-container sign-up-container">
            <form action="#">
                <h1>Create Account</h1>
                <div class="social-container">
                    <a href="#" class="social" style="font-weight:bold; font-size: 14px;">G+</a>
                    <a href="#" class="social" style="font-weight:bold; font-size: 14px;">f</a>
                    <a href="#" class="social"><i class="fab fa-github"></i></a>
                    <a href="#" class="social" style="font-weight:bold; font-size: 14px;">in</a>
                </div>
                <span class="sub-text">or use your email for registration</span>
                <input type="text" placeholder="Name" />
                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Password" />
                <button type="button" class="form-btn">SIGN UP</button>
            </form>
        </div>
        
        <!-- sign in part -->
        <div class="form-container sign-in-container">
            <form action="#">
                <h1>Sign In</h1>
                <div class="social-container">
                    <a href="#" class="social" style="font-weight:bold; font-size: 14px;">G+</a>
                    <a href="#" class="social" style="font-weight:bold; font-size: 14px;">f</a>
                    <a href="#" class="social"><i class="fab fa-github"></i></a>
                    <a href="#" class="social" style="font-weight:bold; font-size: 14px;">in</a>
                </div>
                <span class="sub-text">or use your email password</span>
                <input type="email" placeholder="Email" id="email" value="raniflex@gmail.com" />
                <input type="password" placeholder="Password" id="password" value="............." />
                <a href="#" class="forget-password">Forget Your Password?</a>
                <button type="button" class="form-btn" id="signInBtnSubmit">SIGN IN</button>
            </form>
        </div>

        <!-- overlay -->
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="ghost" id="signIn">SIGN IN</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, EveryOne!</h1>
                    <p>Register with your personal details to use all of site features</p>
                    <button class="ghost" id="signUp">SIGN UP</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/login.js"></script>
</body>
</html>
